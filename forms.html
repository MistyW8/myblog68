<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="forms.css" <title>Document</title>
</head>
<body>
    <div class="form-container">
        <!--block-->
        <h2>Contact</h2>>

        <form>
            <!--inline-->
            <div class="input-container"> 
                <label>Name:</label>
                <input type="text" required id="txtName" name="user_name" >
            </div>
            <div class="input-container">
                <label>Email:</label>
                <input type="email" placeholder="Add your email" required>
            </div>
            <div class="input-container">
                <label>Age:</label>
                <input type="number" value="100">
            </div>
            <div class="input-container">
                <label>Password</label>
                <input type="password" max length="6" name="password">
            </div>

                <button>Send</button>
        </form>
    </div>
    

    
</body>
</html>
